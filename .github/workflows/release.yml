name: Release (npm publish)

# Publishes to npm when you push a version tag (e.g. v0.1.1).
# Typical flow:  npm version patch  &&  git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # Guard: the tag (vX.Y.Z) must match package.json's version.
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      # No NODE_AUTH_TOKEN / NPM_TOKEN: auth comes from GitHub's OIDC token via
      # the Trusted Publisher configured on npmjs.com. Provenance is automatic.
      - name: Publish to npm (Trusted Publishing / OIDC)
        run: npm publish --access public
